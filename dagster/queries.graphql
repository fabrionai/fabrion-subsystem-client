# GraphQL operations for Dagster orchestration integration
# These operations are used by genqlient to generate type-safe Go code

# ListRepositories retrieves all repositories with their jobs
query ListRepositories {
  repositoriesOrError {
    __typename
    ... on RepositoryConnection {
      nodes {
        name
        location {
          name
        }
        jobs {
          name
          description
        }
      }
    }
    ... on PythonError {
      message
      stack
    }
  }
}

# LaunchRun starts a new job/pipeline run
mutation LaunchRun($executionParams: ExecutionParams!) {
  launchRun(executionParams: $executionParams) {
    __typename
    ... on LaunchRunSuccess {
      run {
        runId
        jobName
        status
        startTime
        endTime
        tags {
          key
          value
        }
      }
    }
    ... on PythonError {
      message
      stack
    }
    ... on RunConfigValidationInvalid {
      pipelineName
      errors {
        message
        path
        reason
      }
    }
    ... on PipelineNotFoundError {
      message
      pipelineName
      repositoryName
      repositoryLocationName
    }
    ... on ConflictingExecutionParamsError {
      message
    }
    ... on PresetNotFoundError {
      message
      preset
    }
    ... on UnauthorizedError {
      message
    }
    ... on RunConflict {
      message
    }
    ... on InvalidStepError {
      invalidStepKey
    }
    ... on InvalidOutputError {
      stepKey
      invalidOutputName
    }
    ... on NoModeProvidedError {
      message
    }
  }
}

# GetRun retrieves a single run by its ID
query GetRun($runId: ID!) {
  runOrError(runId: $runId) {
    __typename
    ... on Run {
      runId
      jobName
      status
      startTime
      endTime
      tags {
        key
        value
      }
    }
    ... on RunNotFoundError {
      runId
      message
    }
    ... on PythonError {
      message
      stack
    }
  }
}

# ListRuns retrieves multiple runs with optional filtering
# @genqlient(pointer: true)
query ListRuns($filter: RunsFilter, $limit: Int) {
  runsOrError(filter: $filter, limit: $limit) {
    __typename
    ... on Runs {
      results {
        runId
        jobName
        status
        startTime
        endTime
        tags {
          key
          value
        }
      }
      count
    }
    ... on PythonError {
      message
      stack
    }
  }
}

# TerminateRun cancels a running job/pipeline
mutation TerminateRun($runId: String!) {
  terminateRun(runId: $runId) {
    __typename
    ... on TerminateRunSuccess {
      run {
        runId
        jobName
        status
      }
    }
    ... on TerminateRunFailure {
      message
      run {
        runId
        status
      }
    }
    ... on RunNotFoundError {
      runId
      message
    }
    ... on PythonError {
      message
      stack
    }
    ... on UnauthorizedError {
      message
    }
  }
}
